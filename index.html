<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      font-family: 'Inter', sans-serif;
    }

    .calc-wrap {
      position: relative;
    }

    
    .calc-wrap::before {
      content: '';
      position: absolute;
      inset: -40px;
      background: radial-gradient(ellipse at 50% 50%, rgba(99, 102, 241, 0.15), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .calculator {
      position: relative;
      z-index: 1;
      width: 320px;
      background: #1a1a24;
      border-radius: 24px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 32px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    
    .display {
      background: #111118;
      border-radius: 14px;
      padding: 20px 20px 16px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.06);
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      overflow: hidden;
    }

    .expression {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: rgba(255,255,255,0.28);
      min-height: 18px;
      letter-spacing: 0.5px;
      word-break: break-all;
      text-align: right;
    }

    .result {
      font-family: 'DM Mono', monospace;
      font-size: 40px;
      font-weight: 300;
      color: #fff;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-top: 6px;
      word-break: break-all;
      text-align: right;
      transition: color 0.15s;
    }

    .result.error { color: #f87171; font-size: 22px; }

    
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 64px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 500;
      transition: transform 0.08s, background 0.1s, box-shadow 0.1s;
      outline: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    button:active { transform: scale(0.93); }

    
    .btn-num {
      background: #252535;
      color: #e8e8f0;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .btn-num:hover { background: #2e2e42; }

    
    .btn-zero {
      grid-column: span 2;
      text-align: left;
      padding-left: 26px;
    }

    
    .btn-op {
      background: #2d2b4e;
      color: #a5b4fc;
      border: 1px solid rgba(165,180,252,0.12);
    }
    .btn-op:hover { background: #363460; }

    
    .btn-func {
      background: #252535;
      color: #a0a0b8;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .btn-func:hover { background: #2e2e42; }

   
    .btn-eq {
      background: #6366f1;
      color: #fff;
      border: none;
      box-shadow: 0 4px 16px rgba(99,102,241,0.35);
    }
    .btn-eq:hover { background: #7577f5; box-shadow: 0 6px 20px rgba(99,102,241,0.45); }

    
    .btn-back {
      background: #252535;
      color: #f87171;
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 20px;
    }
    .btn-back:hover { background: #2e2e42; }
  </style>
</head>
<body>
<div class="calc-wrap">
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      
      <button class="btn-func" onclick="clearAll()">AC</button>
      <button class="btn-func" onclick="toggleSign()">+/−</button>
      <button class="btn-func" onclick="percent()">%</button>
      <button class="btn-op"   onclick="setOp('/')">÷</button>
     
      <button class="btn-num" onclick="appendNum('7')">7</button>
      <button class="btn-num" onclick="appendNum('8')">8</button>
      <button class="btn-num" onclick="appendNum('9')">9</button>
      <button class="btn-op"  onclick="setOp('*')">×</button>
      
      <button class="btn-num" onclick="appendNum('4')">4</button>
      <button class="btn-num" onclick="appendNum('5')">5</button>
      <button class="btn-num" onclick="appendNum('6')">6</button>
      <button class="btn-op"  onclick="setOp('-')">−</button>
      
      <button class="btn-num" onclick="appendNum('1')">1</button>
      <button class="btn-num" onclick="appendNum('2')">2</button>
      <button class="btn-num" onclick="appendNum('3')">3</button>
      <button class="btn-op"  onclick="setOp('+')">+</button>
      
      <button class="btn-num btn-zero" onclick="appendNum('0')">0</button>
      <button class="btn-num" onclick="appendDot()">.</button>
      <button class="btn-eq"  onclick="calculate()">=</button>
    </div>
  </div>
</div>

<script>
  let current = '0';
  let prev = '';
  let operator = '';
  let justEvaled = false;

  const resultEl = document.getElementById('result');
  const exprEl   = document.getElementById('expression');

  function updateDisplay() {
    resultEl.textContent = current;
    resultEl.className = 'result';
    
    const n = parseFloat(current);
    if (!isNaN(n) && current.length > 12) {
      resultEl.textContent = parseFloat(n.toPrecision(10)).toString();
    }
  }

  function appendNum(n) {
    if (justEvaled) { current = n; justEvaled = false; }
    else current = current === '0' ? n : current + n;
    updateDisplay();
  }

  function appendDot() {
    if (justEvaled) { current = '0.'; justEvaled = false; updateDisplay(); return; }
    if (!current.includes('.')) current += '.';
    updateDisplay();
  }

  function setOp(op) {
    justEvaled = false;
    if (prev !== '' && operator) calculate(true);
    prev = current;
    operator = op;
    current = '0';
    const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
    exprEl.textContent = prev + ' ' + (symbols[op] || op);
  }

  function calculate(chained = false) {
    if (!operator || prev === '') return;
    const a = parseFloat(prev), b = parseFloat(current);
    let res;
    if (operator === '/' && b === 0) { showError('Division by zero'); return; }
    if      (operator === '+') res = a + b;
    else if (operator === '-') res = a - b;
    else if (operator === '*') res = a * b;
    else if (operator === '/') res = a / b;

    const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
    if (!chained) exprEl.textContent = prev + ' ' + (symbols[operator]||operator) + ' ' + current + ' =';
    current = parseFloat(res.toPrecision(12)).toString();
    operator = '';
    prev = '';
    justEvaled = !chained;
    updateDisplay();
  }

  function clearAll() {
    current = '0'; prev = ''; operator = '';
    justEvaled = false;
    exprEl.textContent = '';
    updateDisplay();
  }

  function toggleSign() {
    if (current !== '0') current = (parseFloat(current) * -1).toString();
    updateDisplay();
  }

  function percent() {
    current = (parseFloat(current) / 100).toString();
    updateDisplay();
  }

  function showError(msg) {
    resultEl.textContent = msg;
    resultEl.className = 'result error';
    setTimeout(clearAll, 1600);
  }

  
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') appendNum(e.key);
    else if (e.key === '.') appendDot();
    else if (e.key === '+') setOp('+');
    else if (e.key === '-') setOp('-');
    else if (e.key === '*') setOp('*');
    else if (e.key === '/') { e.preventDefault(); setOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') {
      if (current.length > 1) current = current.slice(0, -1);
      else current = '0';
      updateDisplay();
    }
  });
</script>
</body>
</html>
